<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&family=Nabla&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Juste Prix</title>
</head>
<body>
    <div class="container">
        <header>
            Le Juste Prix <span>#Amin</span> 
        </header>
        
        <!-- Formulaire -->  
                
        <form id="formulaire">
            <div class="col">
                <div class="bottom">
                    <div class="flex">
                        <input id="prix" class="form-control" placeholder="Devinez le prix ! (entre 0 et 1 000)" />  
                        <button type="submit">Deviner</button>
                    </div>
                    
                    <small class="text-danger">Vous devez rentrer un nombre !</small>
                </div>
                
            </div>
        </form>
        
        <!-- Instructions -->
        <div id="instructions"></div>
        
    </div>



    <script src="script.js"></script>
</body>
</html>
